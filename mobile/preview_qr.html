<!DOCTYPE html>
<html>
<head>
  <title>Expo Go QR Code</title>
  <style>
    body { background: #0A1024; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: Arial, sans-serif; }
    .card { background: #fff; border-radius: 20px; padding: 40px; text-align: center; box-shadow: 0 10px 40px rgba(59,130,246,0.3); }
    h1 { color: #0A1024; margin: 0 0 5px; font-size: 22px; }
    p { color: #666; margin: 5px 0 20px; }
    code { background: #f0f4ff; padding: 8px 16px; border-radius: 8px; font-size: 16px; color: #1a56db; display: inline-block; margin-top: 15px; }
    img { border-radius: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>KEC Indoor Navigator</h1>
    <p>Scan with Expo Go app</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=exp%3A%2F%2F10.133.125.170%3A8081" alt="QR Code" width="280" height="280" />
    <br>
    <code>exp://10.133.125.170:8081</code>
  </div>
</body>
</html>
